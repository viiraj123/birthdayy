<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Happy Birthday Janhavi ❤️</title>

    <link rel="stylesheet" href="style.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Patrick+Hand&display=swap" rel="stylesheet">

</head>

<body>

    <!-- Floating Hearts -->
    <div class="hearts"></div>

    <main class="hero">

        <!-- Decorative Flower -->
        <img src="https://images.unsplash.com/photo-1525310072745-f49212b5ac6d?auto=format&fit=crop&w=500&q=80"
            class="flower" alt="Flower">

        <!-- Decorative Disco Ball -->
        <img src="https://cdn-icons-png.flaticon.com/512/3659/3659898.png"
            class="disco" alt="Disco Ball">

        <!-- Decorative Stars -->
        <div class="star star1">⭐</div>
        <div class="star star2">✨</div>
        <div class="star star3">⭐</div>

        <!-- Main Photo -->
        <div class="photo-section">

            <img src="images/janhavi.jpg"
                class="main-photo"
                alt="Janhavi">

            <div class="party-hat">🎉</div>

        </div>

        <!-- Birthday Heading -->
        <h1 class="title">

            <span>H</span>
            <span>A</span>
            <span>P</span>
            <span>P</span>
            <span>Y</span>

            <br>

            <span>B</span>
            <span>I</span>
            <span>R</span>
            <span>T</span>
            <span>H</span>
            <span>D</span>
            <span>A</span>
            <span>Y</span>

            <br>

            <span class="name">JANHAVI</span>

        </h1>

        <p class="subtitle">

            A little surprise made just for you 💖

        </p>

        <button id="openGift">

            🎁 Open Your Surprise

        </button>

    </main>

    <script src="script.js"></script>

</body>

</html>
